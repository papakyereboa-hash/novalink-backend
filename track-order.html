<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Track Order - NovaLink</title>

<style>

body{
  font-family:Segoe UI,sans-serif;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00f260;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Track Order</h2>

<input
id="phone"
placeholder="Enter phone number">

<button onclick="trackOrder()">
Check Status
</button>

<div id="result" class="result"></div>

</div>

<script>

async function trackOrder() {

const phone =
document.getElementById("phone").value;

const resultDiv =
document.getElementById("result");

resultDiv.innerHTML = "Loading...";

const today =
new Date().toISOString().split("T")[0];

try {

const response = await fetch(
`https://novalink-backend-eyp1.onrender.com/api/track-order?phone=${phone}&date=${today}`
);

const data = await response.json();

if (
!data.orders ||
data.orders.length === 0
) {
resultDiv.innerHTML =
"No orders found";
return;
}

let html = "";

data.orders.forEach(order => {

html += `
<div style="
margin-top:15px;
padding:10px;
border:1px solid white;
border-radius:10px;
">

<p><b>Bundle:</b> ${order.bundle}</p>

<p><b>Amount:</b> GH₵ ${order.amount}</p>

<p><b>Status:</b> ${order.status}</p>

<p><b>Reference:</b> ${order.reference}</p>

<p><b>Date:</b> ${new Date(order.created_at).toLocaleString()}</p>

</div>
`;

});

resultDiv.innerHTML = html;

} catch (err) {

console.log(err);

resultDiv.innerHTML =
"Error fetching orders";

}

}

</script>

</body>
</html>
