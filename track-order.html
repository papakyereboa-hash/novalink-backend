<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - NovaLink</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at left,#003cff 0%,transparent 40%),
    radial-gradient(circle at right,#8c00ff 0%,transparent 40%),
    #050816;
    color:white;
    padding: 15px;
}

.container{
    max-width: 500px;
    max-height: 500px;
}

.card{
    background:rgba(255,255,255,.03);
    border:2px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:20px;
    backdrop-filter:blur(25px);
    box-shadow:
    0 0 40px rgba(0,255,255,.2),
    0 0 60px rgba(162,0,255,.2);
}

.logo{
    width:40px;
    height:40px;
    margin:auto;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
}

h1{
    text-align:center;
    font-size:30px;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#cfcfcf;
    margin-top:10px;
    font-size:14px;
}

.input-box{
    margin-top: 16px;
}

.input-box input{
    width:100%;
    padding:12px;
    border-radius:20px;
    border:2px solid #6d4dff;
    background:rgba(255,255,255,.05);
    color:white;
    font-size: 13px;
    outline:none;
}

.input-box input::placeholder{
    color:#bdbdbd;
}

.input-box input:focus{
    border:2px solid #ffffff;
    box-shadow:0 0 12px #ffffff61;
}

.track-btn{
    width:180px;
    display:block;
    margin:25px auto 0 auto;

    border:none;
    padding:13px;
    border-radius:20px;
    font-size:15px;
    font-weight:bold;
    color:white;
    cursor:pointer;

    background:linear-gradient(
        90deg,
        #00ff84,
        #006eff,
        #c000ff
    );

    box-shadow:0 0 30px rgba(0,255,255,.4);
}

.features{
    text-align:center;
    margin-top:15px;
    color:#ddd;
    font-size:16px;
}

.stats{
    margin-top:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 5px;

    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:10px;
}

.box{
    flex:1;
    text-align:center;
    padding:5px;
}

.box:not(:last-child){
    border-right:1px solid rgba(255,255,255,.1);
}

.icon{
    font-size:18px;
}

.box h3{
    font-size:12px;
    font-weight:600;
}

.result{
    margin-top:30px;
}

.order-card{
    margin-top:15px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
}

@media(max-width:768px){

    .stats{
        flex-wrap:wrap;
        margin-top: 30px;
    }

    .box{
        flex:0 0 15%;
        border-right:none !important;
    }

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="logo">📦</div>

<h1>Track Your Order</h1>

<p class="subtitle">
Enter your phone number to check your order status
</p>

<div class="input-box">
<input
type="text"
id="phone"
placeholder="Enter Phone Number">
</div>

<div class="input-box">
  <input
    type="date"
    id="orderDate">
</div>

<button class="track-btn" onclick="trackOrder()">
🔍 TRACK ORDER
</button>

<div class="features">
🛡️ Fast • 🔒 Secure • ✅ Reliable
</div>

<div class="stats">

<div class="box">
<div class="icon">🔒</div>
<h3>Secure Payment</h3>
</div>

<div class="box">
<div class="icon">⚡</div>
<h3>Instant Delivery</h3>
</div>

<div class="box">
<div class="icon">🎧</div>
<h3>24/7 Support</h3>
</div>

<div class="box">
<div class="icon">📍</div>
<h3>Real-Tracking</h3>
</div>

</div>

<div id="result" class="result"></div>

</div>

</div>

<script>

async function trackOrder(){

const phone =
document.getElementById("phone").value;

const result =
document.getElementById("result");

if(!phone || !selectedDate){
  result.innerHTML =
  "<h3>Please enter phone number and date</h3>";
  return;
}

result.innerHTML = "Loading...";

const selectedDate =
document.getElementById("orderDate").value;
try{

const response = await fetch(
`https://novalink-backend-eyp1.onrender.com/api/track-order?phone=${phone}&date=${selectedDate}`
);

const data = await response.json();

if(!data.orders || data.orders.length === 0){

result.innerHTML =
"<h3>No orders found</h3>";

return;
}

let html = "";

data.orders.forEach(order => {

html += `
<div class="order-card">

<p><b>Bundle:</b> ${order.bundle}</p>
<p><b>Amount:</b> GH₵ ${order.amount}</p>
<p><b>Status:</b> ${order.status}</p>
<p><b>Reference:</b> ${order.reference}</p>
<p><b>Date:</b> ${new Date(order.created_at).toLocaleString()}</p>

</div>
`;

});

result.innerHTML = html;

}
catch(err){

result.innerHTML =
"<h3>Error fetching orders</h3>";

}

}

</script>

</body>
</html>
