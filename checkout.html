<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Checkout</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* card */
.container{
  width:90%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
}

/* steps */
.step{
  display:none;
}

.active{
  display:block;
}

/* input */
input{
  width:93%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:white;
  color:black;
}

input:focus{
  outline:none;
  box-shadow:0 0 10px #00f260;
}

/* buttons */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

.next{
  background:#00f260;
}

.back{
  background:white;
}

.pay{
  background:#00f260;
}

/* button row */
.btn-row{
  display:flex;
  gap:10px;
}

.btn-row button{
  width:50%;
}

/* progress */
.progress{
  height:6px;
  background:#333;
  border-radius:10px;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:50%;
  background:#00f260;
  transition:0.3s;
}

</style>
</head>

<body>

<div class="container" id="mainBox">

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">

    <h3>🛜 Enter Phone Number</h3>

    <p><b>Bundle:</b> <span id="bundle"></span></p>

    <p><b>Price:</b> <span id="price"></span></p>

    <hr>

    <p>Recipient Number</p>

    <input
      type="tel"
      id="phone"
      placeholder="055xxxxxxx"
    >

    <p id="phoneStatus"></p>

    <div class="btn-row">

      <button class="back" onclick="goHome()">
        ← Back
      </button>

      <button class="next" onclick="goStep2()">
        Next →
      </button>

    </div>

  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">

    <h3>Review Transaction</h3>

    <hr>

    <p><b>Phone:</b> <span id="r_phone"></span></p>

    <p><b>Bundle:</b> <span id="r_bundle"></span></p>

    <p><b>Price:</b> <span id="r_price"></span></p>

    <button class="pay" onclick="pay()">
      Confirm & Pay
    </button>

    <button class="back" onclick="back()">
      ← Back
    </button>

  </div>

</div>

<!-- SUCCESS -->
<div id="success" style="display:none;text-align:center;">

  <h2>🎉 Payment Successful</h2>

  <p>
    Your data bundle is being processed...
  </p>

  <button onclick="goHome()">
    Back To Store
  </button>

</div>
<script>

/* =========================
   GET URL VALUES
========================= */

const params = new URLSearchParams(window.location.search);

const bundle = params.get("bundle");
const price = params.get("price");

/* =========================
   SHOW DATA
========================= */

document.getElementById("bundle").innerText =
  bundle || "No Bundle";

document.getElementById("price").innerText =
  "GH₵ " + Number(price || 0).toFixed(2);

/* =========================
   GO HOME
========================= */

function goHome(){

  window.location.href = "index.html";

}

/* =========================
   PHONE VALIDATION
========================= */

const phoneInput =
  document.getElementById("phone");

const status =
  document.getElementById("phoneStatus");

phoneInput.addEventListener("input", () => {

  if(/^0\d{9}$/.test(phoneInput.value)){

    status.innerText = "✔ Valid number";
    status.style.color = "lightgreen";

  }else{

    status.innerText = "✖ Invalid number";
    status.style.color = "salmon";

  }

});

/* =========================
   STEP 2
========================= */

function goStep2(){

  const phone = phoneInput.value;

  if(!/^0\d{9}$/.test(phone)){

    alert("Enter valid Ghana number");

    return;

  }

  document.getElementById("r_phone").innerText =
    phone;

  document.getElementById("r_bundle").innerText =
    bundle;

  document.getElementById("r_price").innerText =
    "GH₵ " + Number(price).toFixed(2);

  document.getElementById("step1")
    .classList.remove("active");

  document.getElementById("step2")
    .classList.add("active");

  document.getElementById("progressBar")
    .style.width = "100%";

}

/* =========================
   BACK
========================= */

function back(){

  document.getElementById("step2")
    .classList.remove("active");

  document.getElementById("step1")
    .classList.add("active");

  document.getElementById("progressBar")
    .style.width = "50%";

}

/* =========================
   SEND DATA FUNCTION
========================= */

async function sendData(phone, reference){

  try{

    const res = await fetch(
      "https://novalink-backend-eyp1.onrender.com/api/buy-data",
      {
        method: "POST",

        headers:{
          "Content-Type":"application/json"
        },

        body: JSON.stringify({

          phone,

          volumeInMB:
            Number(bundle.replace("GB","")) * 1000,

          bundle,

          amount: price,

          reference

        })

      }
    );

    const data = await res.json();

    console.log(data);

    alert("Data sent successfully");

  }catch(error){

    console.log(error);

    alert("Payment succeeded but data delivery failed");

  }

}
/* =========================
   PAYSTACK
========================= */

function pay(){

  console.log("PAY BUTTON CLICKED");

  const phone = phoneInput.value;

  if(!/^0\d{9}$/.test(phone)){

    alert("Invalid phone number");

    return;

  }

  /* CHECK PAYSTACK */

  if(typeof PaystackPop === "undefined"){

    alert("Paystack failed to load");

    return;

  }

  /* AMOUNT */

  const amount =
    Math.round(Number(price) * 100);

  console.log("Amount:", amount);

  try{

    const handler = PaystackPop.setup({

      key: "pk_test_258a937224fc0863a48db2da04f684a125753264",

      email: phone + "@pay.com",

      amount: amount,

      currency: "GHS",

      callback: function(response){

  alert("PAYMENT SUCCESS");

  console.log("PAYMENT SUCCESS");

  console.log(response);

  console.log("REFERENCE:", response.reference);

  sendData(
    phone,
    response.reference
  );

  document.getElementById("mainBox")
    .style.display = "none";

  document.getElementById("success")
    .style.display = "block";
},
      onClose: function(){

        alert("Payment cancelled");

      }

    });

    console.log("OPENING PAYSTACK");

    handler.openIframe();

  }catch(error){

    console.log("FULL ERROR:", error);

    alert(error.message);

  }

}

</script>

</body>
</html>
